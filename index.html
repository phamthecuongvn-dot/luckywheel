<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>VÒNG QUAY MS HƯƠNG</title>
    <style>
        body { text-align: center; font-family: Arial, sans-serif; background: #f4f7f6; padding-top: 50px; }
        .wheel-container { position: relative; width: 350px; height: 350px; margin: 0 auto; }
        #wheel { width: 100%; height: 100%; border-radius: 50%; border: 8px solid #333; 
                 transition: transform 5s cubic-bezier(0.1, 0, 0.2, 1);
                 background: conic-gradient(#e74c3c 0deg 90deg, #f1c40f 90deg 180deg, #2ecc71 180deg 270deg, #3498db 270deg 360deg); }
        .pointer { position: absolute; top: -20px; left: 50%; transform: translateX(-50%); 
                   width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 30px solid #333; z-index: 10; }
        button { margin-top: 40px; padding: 15px 40px; font-size: 20px; cursor: pointer; background: #e74c3c; color: #fff; border: none; border-radius: 50px; font-weight: bold; box-shadow: 0 4px #c0392b; }
        button:active { box-shadow: none; transform: translateY(4px); }
        #result { margin-top: 20px; font-size: 22px; font-weight: bold; color: #2c3e50; }
    </style>
</head>
<body>
    <h1>VÒNG QUAY MAY MẮN MS HƯƠNG</h1>
    <div class="wheel-container">
        <div class="pointer"></div>
        <div id="wheel"></div>
    </div>
    <button onclick="spin()">BẤM ĐỂ QUAY</button>
    <div id="result"></div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const r = parseInt(params.get('r')) || 0;
        function spin() {
            const wheel = document.getElementById('wheel');
            const resultText = document.getElementById('result');
            // Tính toán góc quay để dừng đúng vị trí dựa trên r (0-100)
            const stopDeg = 3600 + (360 - (r * 3.6)); 
            wheel.style.transform = "rotate(" + stopDeg + "deg)";
            setTimeout(() => {
                resultText.innerText = "KẾT QUẢ ĐÃ ĐƯỢC GHI NHẬN!";
            }, 5000);
        }
    </script>
</body>
</html>
