<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>QUAY THƯỞNG NGÔI SAO MAY MẮN</title>
    <style>
        body { text-align: center; font-family: 'Segoe UI', Arial, sans-serif; background: #f8f9fa; margin: 0; padding-top: 20px; }
        h1 { color: #2c3e50; text-transform: uppercase; letter-spacing: 2px; font-weight: 800; margin-bottom: 30px; }
        .container { position: relative; width: 500px; height: 500px; margin: 0 auto; display: flex; align-items: center; justify-content: center; }
        #wheel { width: 440px; height: 440px; transition: transform 6s cubic-bezier(0.1, 0, 0, 1); filter: drop-shadow(0 15px 35px rgba(0,0,0,0.15)); }
        .center-hub { position: absolute; z-index: 100; top: 50%; left: 50%; transform: translate(-50%, -50%); display: flex; flex-direction: column; align-items: center; pointer-events: none; }
        .arrow { width: 0; height: 0; border-left: 20px solid transparent; border-right: 20px solid transparent; border-bottom: 50px solid #2c3e50; margin-bottom: -5px; }
        .star-circle { font-size: 50px; background: white; border: 8px solid #2c3e50; border-radius: 50%; width: 90px; height: 90px; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .btn-spin { margin-top: 40px; padding: 20px 70px; font-size: 26px; font-weight: 900; cursor: pointer; background: #e74c3c; color: white; border: none; border-radius: 100px; box-shadow: 0 8px 0 #c0392b; text-transform: uppercase; }
        .btn-spin:active { transform: translateY(6px); box-shadow: 0 2px 0 #c0392b; }
        #result-display { margin-top: 30px; font-size: 30px; font-weight: 800; color: #2c3e50; min-height: 45px; text-transform: uppercase; }
    </style>
</head>
<body>
    <h1>QUAY THƯỞNG NGÔI SAO MAY MẮN</h1>
    <div class="container">
        <div class="center-hub">
            <div class="arrow"></div>
            <div class="star-circle">⭐</div>
        </div>
        <svg id="wheel" viewBox="0 0 100 100">
            <defs>
                <path id="path1" d="M 50 50 L 85 15" />
                <path id="path2" d="M 50 50 L 85 85" />
                <path id="path3" d="M 50 50 L 15 85" />
                <path id="path4" d="M 50 50 L 15 15" />
            </defs>
            <path d="M 50 50 L 50 0 A 50 50 0 0 1 100 50 Z" fill="#e74c3c"/>
            <path d="M 50 50 L 100 50 A 50 50 0 0 1 50 100 Z" fill="#f1c40f"/>
            <path d="M 50 50 L 50 100 A 50 50 0 0 1 0 50 Z" fill="#2ecc71"/>
            <path d="M 50 50 L 0 50 A 50 50 0 0 1 50 0 Z" fill="#3498db"/>
            <g font-size="4.8" font-weight="900" fill="white" text-anchor="end">
                <text><textPath xlink:href="#path1" startOffset="92%">GIẢI NHẤT</textPath></text>
                <text><textPath xlink:href="#path2" startOffset="92%">GIẢI NHÌ</textPath></text>
                <text><textPath xlink:href="#path3" startOffset="92%">GIẢI BA</textPath></text>
                <text><textPath xlink:href="#path4" startOffset="92%">LẦN SAU</textPath></text>
            </g>
        </svg>
    </div>
    <button class="btn-spin" id="spinBtn" onclick="doSpin()">BẤM ĐỂ QUAY</button>
    <div id="result-display"></div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const r = parseInt(urlParams.get('r')) || 0;
        const wheel = document.getElementById('wheel');
        const display = document.getElementById('result-display');
        function doSpin() {
            document.getElementById('spinBtn').disabled = true;
            display.innerText = "ĐANG QUAY...";
            let extraAngle = 0;
            let giftText = "";
            if (r > 75) { extraAngle = 335; giftText = "GIẢI NHẤT 🏆"; } 
            else if (r > 50) { extraAngle = 245; giftText = "GIẢI NHÌ 🥈"; } 
            else if (r > 25) { extraAngle = 155; giftText = "GIẢI BA 🥉"; } 
            else { extraAngle = 65; giftText = "MAY MẮN LẦN SAU 🍀"; }
            wheel.style.transform = `rotate(${3600 + extraAngle}deg)`;
            setTimeout(() => {
                display.innerText = "KẾT QUẢ: " + giftText;
            }, 6200);
        }
    </script>
</body>
</html>
