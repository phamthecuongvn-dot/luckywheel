<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUAY THƯỞNG NGÔI SAO MAY MẮN</title>
    <style>
        body { text-align: center; font-family: 'Segoe UI', Arial, sans-serif; background: #f8f9fa; margin: 0; padding-top: 20px; overflow-x: hidden; }
        h1 { color: #2c3e50; text-transform: uppercase; letter-spacing: 2px; font-weight: 800; margin-bottom: 20px; font-size: 22px; padding: 0 10px; }
        .container { position: relative; width: 90vw; max-width: 480px; aspect-ratio: 1/1; margin: 0 auto; display: flex; align-items: center; justify-content: center; }
        #wheel { width: 90%; height: 90%; transition: transform 6s cubic-bezier(0.1, 0, 0, 1); filter: drop-shadow(0 15px 35px rgba(0,0,0,0.15)); }
        .center-hub { position: absolute; z-index: 100; top: 50%; left: 50%; transform: translate(-50%, -50%); display: flex; flex-direction: column; align-items: center; pointer-events: none; }
        .arrow { width: 0; height: 0; border-left: 18px solid transparent; border-right: 18px solid transparent; border-bottom: 45px solid #2c3e50; margin-bottom: -5px; }
        .star-circle { font-size: 45px; background: white; border: 6px solid #2c3e50; border-radius: 50%; width: 75px; height: 75px; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .btn-spin, .btn-confirm { margin-top: 25px; padding: 18px 40px; font-size: 20px; font-weight: 900; cursor: pointer; border: none; border-radius: 100px; text-transform: uppercase; transition: all 0.2s; width: 85%; max-width: 320px; }
        .btn-spin { background: #e74c3c; color: white; box-shadow: 0 8px 0 #c0392b; display: inline-block; }
        .btn-spin:active { transform: translateY(6px); box-shadow: 0 2px 0 #c0392b; }
        .btn-confirm { background: #27ae60; color: white; box-shadow: 0 8px 0 #1e8449; display: none; margin: 25px auto 0; }
        .btn-confirm:active { transform: translateY(6px); box-shadow: 0 2px 0 #1e8449; }
        #result-display { margin-top: 25px; font-size: 24px; font-weight: 800; color: #2c3e50; min-height: 40px; text-transform: uppercase; padding: 0 10px; }
    </style>
</head>
<body>
    <h1>QUAY THƯỞNG NGÔI SAO MAY MẮN</h1>
    <div class="container">
        <div class="center-hub">
            <div class="arrow"></div>
            <div class="star-circle">⭐</div>
        </div>
        <svg id="wheel" viewBox="0 0 100 100">
            <defs>
                <path id="path1" d="M 50 50 L 85 15" />
                <path id="path2" d="M 50 50 L 85 85" />
                <path id="path3" d="M 50 50 L 15 85" />
                <path id="path4" d="M 50 50 L 15 15" />
            </defs>
            <path d="M 50 50 L 50 0 A 50 50 0 0 1 100 50 Z" fill="#e74c3c"/>
            <path d="M 50 50 L 100 50 A 50 50 0 0 1 50 100 Z" fill="#f1c40f"/>
            <path d="M 50 50 L 50 100 A 50 50 0 0 1 0 50 Z" fill="#2ecc71"/>
            <path d="M 50 50 L 0 50 A 50 50 0 0 1 50 0 Z" fill="#3498db"/>
            <g font-size="4.5" font-weight="900" fill="white" text-anchor="end">
                <text><textPath xlink:href="#path1" startOffset="92%">GIẢI NHẤT</textPath></text>
                <text><textPath xlink:href="#path2" startOffset="92%">GIẢI NHÌ</textPath></text>
                <text><textPath xlink:href="#path3" startOffset="92%">GIẢI BA</textPath></text>
                <text><textPath xlink:href="#path4" startOffset="92%">LẦN SAU</textPath></text>
            </g>
        </svg>
    </div>
    
    <button class="btn-spin" id="spinBtn" onclick="doSpin()">BẤM ĐỂ QUAY</button>
    <button class="btn-confirm" id="confirmBtn" onclick="finishQuay()">ẤN XÁC NHẬN KẾT QUẢ</button>
    <div id="result-display"></div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const r = parseInt(urlParams.get('r')) || 0;
        const wheel = document.getElementById('wheel');
        const display = document.getElementById('result-display');
        const spinBtn = document.getElementById('spinBtn');
        const confirmBtn = document.getElementById('confirmBtn');

        function doSpin() {
            spinBtn.disabled = true;
            display.innerText = "ĐANG QUAY...";
            let extraAngle = 0;
            let giftText = "";

            if (r <= 5) { extraAngle = 337.5; giftText = "GIẢI NHẤT 🏆"; } 
            else if (r <= 15) { extraAngle = 247.5; giftText = "GIẢI NHÌ 🥈"; } 
            else if (r <= 30) { extraAngle = 157.5; giftText = "GIẢI BA 🥉"; } 
            else { extraAngle = 67.5; giftText = "MAY MẮN LẦN SAU 🍀"; }

            wheel.style.transform = `rotate(${3600 + extraAngle}deg)`;

            setTimeout(() => {
                display.innerText = "KẾT QUẢ: " + giftText;
                spinBtn.style.display = "none";
                confirmBtn.style.display = "block";
            }, 6200);
        }

        function finishQuay() {
            display.innerText = "ĐANG QUAY LẠI APP...";
            // Deep Link dẫn thẳng về màn hình App của bạn
            const appLink = "https://www.appsheet.com/start/863aa0c1-11b1-4eea-b064-c0adbd99a368"; 

            setTimeout(() => {
                // Thử đóng tab
                window.close();
                // Nếu trên mobile không đóng được, buộc nhảy về App
                window.location.replace(appLink);
            }, 500);
        }
    </script>
</body>
</html>
